<!DOCTYPE html>

<body>
    <header class="header">
        <div class="header__container container">
            <nav class="header__nav-menu">
                <a href="./index.html" title="Home" class="header__logo logo">
                    <img src="./src/icons/logo.svg" alt="Logo" class="logo__image" width="108" height="35">
                </a>
                <ul class="header__list">
                    <li class="header__item">
